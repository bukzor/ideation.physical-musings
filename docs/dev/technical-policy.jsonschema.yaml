$schema: "http://json-schema.org/draft-07/schema#"
description: >
  Cross-cutting normative design rules -- means, not ends. Each policy
  binds with a declared force (RFC 2119 requirement levels) and links
  upward via why[] to the requirement or goal it serves. The body
  states the rule and links the claim that grounds it via a
  filename-stem reference link -- no separate structured field, to
  avoid duplicating what the link already makes grep-able.
type: object
additionalProperties: false
properties:
  force:
    description: Normative force of this policy, as RFC 2119 requirement levels.
    default: should
    oneOf:
      - const: must
        description: Non-negotiable.
      - const: should
        description: Strong default; deviation needs recorded justification.
      - const: may
        description: Preference; adopt when convenient.
  why:
    description: Paths to the requirement(s) or goal(s) this policy serves
    type: array
    items:
      type: string
  tags:
    description: Topic tags for cross-referencing
    type: array
    items:
      type: string
