$schema: "http://json-schema.org/draft-07/schema#"
description: >
  Top-level project goals. Stable over the project lifetime; direct
  user inputs rather than claims requiring settlement.
type: object
additionalProperties: false
properties:
  why:
    description: Paths to the mission entry this goal serves
    type: array
    items:
      type: string
  status:
    description: Lifecycle state of this goal
    type: string
    enum: [active, deferred, superseded]
    default: active
  ratified:
    description: >
      Date the user accepted this goal (ISO 8601). Only meaningful for
      assistant-proposed goals; user-stated goals are direct inputs and
      carry no mark.
    type: date
